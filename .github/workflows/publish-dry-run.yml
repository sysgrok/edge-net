name: PublishDryRun

on:
  workflow_dispatch

env:
  rust_toolchain: stable

jobs:
  publishdryrun:
    name: Publish Dry Run
    runs-on: ubuntu-latest
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@v4
      - name: Setup | Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.rust_toolchain }}
          components: rust-src
      - name: Build | Publish Dry Run
        run: cargo publish --dry-run
